services:
   mit-badge-front-end:
     container_name: mit-badge-front-end
     build: .
     environment:
      - NEXT_PUBLIC_API_BASE_URL=ADD_YOUR_API_URL_HERE
      - VIRTUAL_HOST=ADD_YOUR_DNS_NAME_HERE
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=ADD_YOUR_DNS_NAME_HERE
     restart: always
   nginx-proxy:
     container_name: nginx-proxy
     image: nginxproxy/nginx-proxy
     ports:
      - "80:80"
      - "443:443"
     volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./certs:/etc/nginx/certs
      - ./vhost:/etc/nginx/vhost.d
      - ./html:/usr/share/nginx/html
     restart: always
   nginx-proxy-acme:
     container_name: nginx-proxy-acme
     image: nginxproxy/acme-companion
     volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./acme:/etc/acme.sh
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./certs:/etc/nginx/certs
      - ./vhost:/etc/nginx/vhost.d
      - ./html:/usr/share/nginx/html
     environment:
      - "DEFAULT_EMAIL=ADD_YOUR_SUPPOR_EMAIL_ADDRESS_HERE"
      - NGINX_PROXY_CONTAINER=nginx-proxy
     depends_on:
      - "nginx-proxy"
     restart: always